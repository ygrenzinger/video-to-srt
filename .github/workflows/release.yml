name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump to release
        required: true
        default: minor
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Validate release branch
        if: github.ref_name != github.event.repository.default_branch
        run: |
          echo "Releases must run from the default branch (${{ github.event.repository.default_branch }}), not ${{ github.ref_name }}." >&2
          exit 1

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Compute next version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          latest_tag="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1)"
          if [[ -z "$latest_tag" ]]; then
            next_tag="v1.0.0"
          else
            version="${latest_tag#v}"
            IFS=. read -r major minor patch <<< "$version"
            case "${{ inputs.bump }}" in
              patch)
                patch=$((patch + 1))
                ;;
              minor)
                minor=$((minor + 1))
                patch=0
                ;;
              major)
                major=$((major + 1))
                minor=0
                patch=0
                ;;
              *)
                echo "Unsupported bump: ${{ inputs.bump }}" >&2
                exit 1
                ;;
            esac
            next_tag="v${major}.${minor}.${patch}"
          fi

          if git rev-parse "$next_tag" >/dev/null 2>&1; then
            echo "Tag already exists: $next_tag" >&2
            exit 1
          fi

          echo "tag=$next_tag" >> "$GITHUB_OUTPUT"
          echo "Next release: $next_tag"

      - name: Create release tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
